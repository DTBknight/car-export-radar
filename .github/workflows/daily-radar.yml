name: Daily vehicle discussion radar scrape

on:
  workflow_dispatch:
  schedule:
    - cron: "18 2 * * *"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run respectful scrape
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          python -m vehicle_frequency_radar \
            --mode mentions \
            --out data/latest \
            --max-pages 1 \
            --discussion-source-file config/discussion_sources.csv \
            --source "YouTube Algeria vehicle import" \
            --source "YouTube Morocco vehicle import" \
            --source "YouTube Libya vehicle import"

      - name: Build site JSON
        run: |
          python -m vehicle_frequency_radar.site \
            --input data/latest \
            --out data/latest.json

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest data/latest.json
          git commit -m "Update daily vehicle discussion radar data" || echo "No data changes to commit"
          git push
